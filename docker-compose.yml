services:
  postgres:
    image: postgres:16-alpine
    container_name: aria-postgres
    environment:
      POSTGRES_USER: aria
      POSTGRES_PASSWORD: aria
      POSTGRES_DB: aria
    ports:
      - "5432:5432"
    volumes:
      - aria_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aria"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aria-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  aria_pg:
